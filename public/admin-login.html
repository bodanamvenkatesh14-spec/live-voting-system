<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – ExpoVote Live</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body style="background:var(--bg-page);">

    <div id="toast-container"></div>

    <div class="login-wrap">
        <div class="login-card">
            <div class="login-card-accent"></div>
            <div class="login-logo">
                <img src="images/ainnovate-logo.png" alt="A INNOVATE"
                    style="height:110px;margin:0 auto 1.5rem;display:block;">
                <h2 style="font-family:'Outfit',sans-serif;">Admin Portal</h2>
                <p>Sign in to manage projects and voting.</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div style="position:relative;">
                        <input type="text" id="username" class="form-control" placeholder="Admin username" required
                            style="padding-left:1.25rem;">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:2rem;">
                    <label class="form-label" for="password">Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required
                            style="padding-left:1.25rem;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-xl btn-full mb-3" id="submit-btn"
                    style="letter-spacing:0.04em;">Unlock Dashboard 🔑</button>
                <div class="text-center">
                    <a href="/"
                        style="font-size:0.85rem;color:var(--text-muted);display:inline-flex;align-items:center;gap:0.3rem;"
                        class="hover:text-primary transition">
                        <span style="font-size:1rem;">←</span> Return to Public Pages
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        if (localStorage.getItem('evl_token')) { window.location.href = '/admin'; }

        function toast(msg, type = 'info', duration = 4000) {
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => {
                el.style.animation = 'slideInRight 0.3s ease-out reverse';
                setTimeout(() => el.remove(), 350);
            }, duration);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Authenticating...';

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('evl_token', data.token);
                    toast('Login successful! Redirecting...', 'success', 2000);
                    setTimeout(() => { window.location.href = '/admin'; }, 600);
                } else {
                    toast(data.message, 'error');
                    document.getElementById('password').value = '';
                }
            } catch { toast('Network error. Is server running?', 'error'); }
            finally { btn.disabled = false; btn.textContent = 'Unlock Dashboard 🔑'; }
        });
    </script>
</body>

</html>
