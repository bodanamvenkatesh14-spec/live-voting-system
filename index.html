<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpoVote Live - Home</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
        .portal-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(16px);
            border: 1px solid var(--primary-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: var(--transition);
        }
        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(108, 99, 255, 0.15);
            border-color: var(--primary-light);
        }
        .portal-card h2 {
            margin: 1rem 0 0.5rem;
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand"><span class="logo-icon">🗳️</span> ExpoVote Live</a>
    </nav>
    <div class="page-hero" style="margin-top: 5rem;">
        <h1>Welcome to <span class="gradient-text">ExpoVote</span></h1>
        <p>Select your portal to continue.</p>
    </div>
    <div class="portal-grid">
        <a href="vote.html" class="portal-card">
            <span style="font-size: 3rem;">🗳️</span>
            <h2>Voter Portal</h2>
            <p style="color:var(--text-secondary);">Cast your votes for projects</p>
        </a>
        <a href="judges.html" class="portal-card">
            <span style="font-size: 3rem;">⚖️</span>
            <h2>Judge Portal</h2>
            <p style="color:var(--text-secondary);">Evaluate and score projects</p>
        </a>
        <a href="leaderboard.html" class="portal-card">
            <span style="font-size: 3rem;">🏆</span>
            <h2>Leaderboards</h2>
            <p style="color:var(--text-secondary);">View live and final results</p>
        </a>
        <a href="admin.html" class="portal-card">
            <span style="font-size: 3rem;">⚙️</span>
            <h2>Admin Panel</h2>
            <p style="color:var(--text-secondary);">Manage the system</p>
        </a>
    </div>
    <script src="script.js"></script>
</body>
</html>
